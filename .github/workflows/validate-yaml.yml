name: Validate YAML

on:
  push:
    branches: [main]
    paths:
      - 'registries/**.yaml'
      - 'registries/**.yml'
  pull_request:
    branches: [main]
    paths:
      - 'registries/**.yaml'
      - 'registries/**.yml'

jobs:
  yaml-lint:
    name: Lint registry YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}" registries/
