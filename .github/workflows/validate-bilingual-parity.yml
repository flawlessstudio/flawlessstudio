name: Validate Bilingual Parity

on:
  push:
    branches: [main]
    paths:
      - 'canon/**.md'
      - 'docs/decisions/**.md'
      - 'CANON.md'
      - 'GOVERNANCE.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CHANGELOG.md'
      - 'REPO_INDEX.md'
  pull_request:
    branches: [main]
    paths:
      - 'canon/**.md'
      - 'docs/decisions/**.md'
      - 'CANON.md'
      - 'GOVERNANCE.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CHANGELOG.md'
      - 'REPO_INDEX.md'

jobs:
  parity-check:
    name: Check EN+ES parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check bilingual parity
        shell: bash
        run: |
          set -e
          FAIL=0

          check_parity() {
            local dir="$1"
            local pattern="$2"
            echo "Checking parity in: $dir"
            find "$dir" -maxdepth 1 -name "$pattern" ! -name "*.es.md" | while read EN_FILE; do
              ES_FILE="${EN_FILE%.md}.es.md"
              if [ ! -f "$ES_FILE" ]; then
                echo "MISSING ES pair: $ES_FILE"
                FAIL=1
              fi
            done
          }

          # canon/ — all docs except README
          find canon -maxdepth 1 -name '*.md' ! -name '*.es.md' ! -name 'README.md' | while read EN_FILE; do
            ES_FILE="${EN_FILE%.md}.es.md"
            if [ ! -f "$ES_FILE" ]; then
              echo "::error file=$EN_FILE::Missing ES pair: $ES_FILE"
              exit 1
            fi
          done

          # docs/decisions/ — all docs except README
          find docs/decisions -maxdepth 1 -name '*.md' ! -name '*.es.md' ! -name 'README.md' | while read EN_FILE; do
            ES_FILE="${EN_FILE%.md}.es.md"
            if [ ! -f "$ES_FILE" ]; then
              echo "::error file=$EN_FILE::Missing ES pair: $ES_FILE"
              exit 1
            fi
          done

          # Root canonical files
          for FILE in CANON GOVERNANCE SECURITY SUPPORT CODE_OF_CONDUCT CHANGELOG REPO_INDEX; do
            if [ -f "${FILE}.md" ] && [ ! -f "${FILE}.es.md" ]; then
              echo "::error file=${FILE}.md::Missing ES pair: ${FILE}.es.md"
              exit 1
            fi
          done

          echo "Bilingual parity check passed."
