name: Validate Bilingual Parity

on:
  push:
    branches: [main]
    paths:
      - 'canon/**.md'
      - 'docs/decisions/**.md'
      - 'CANON.md'
      - 'GOVERNANCE.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CHANGELOG.md'
      - 'REPO_INDEX.md'
  pull_request:
    branches: [main]
    paths:
      - 'canon/**.md'
      - 'docs/decisions/**.md'
      - 'CANON.md'
      - 'GOVERNANCE.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CHANGELOG.md'
      - 'REPO_INDEX.md'

jobs:
  parity-check:
    name: Check EN+ES parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check bilingual parity
        shell: bash
        run: |
          set -euo pipefail
          FAIL=0

          check_dir() {
            local dir="$1"
            local excludes=("*.es.md" "README.md")

            mapfile -t EN_FILES < <(
              find "$dir" -maxdepth 1 -name '*.md' \
                ! -name '*.es.md' \
                ! -name 'README.md'
            )

            for EN_FILE in "${EN_FILES[@]}"; do
              ES_FILE="${EN_FILE%.md}.es.md"
              if [ ! -f "$ES_FILE" ]; then
                echo "::error file=$EN_FILE::Missing ES pair: $ES_FILE"
                FAIL=1
              fi
            done
          }

          check_dir "canon"
          check_dir "docs/decisions"

          # Root canonical files
          for FILE in CANON GOVERNANCE SECURITY SUPPORT CODE_OF_CONDUCT CHANGELOG REPO_INDEX; do
            if [ -f "${FILE}.md" ] && [ ! -f "${FILE}.es.md" ]; then
              echo "::error file=${FILE}.md::Missing ES pair: ${FILE}.es.md"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "Bilingual parity check FAILED."
            exit 1
          fi

          echo "Bilingual parity check passed."
